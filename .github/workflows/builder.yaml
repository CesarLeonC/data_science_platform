name: "Docker Image Builder"
on:
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Revisando contenido de repositorio"
        shell: bash
        run: |
          ls -al "/home/runner/work/data_science_platform/data_science_platform"

      - name: "Login to Docker Hub"
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Setting up QEMU in Docker"
        uses: docker/setup-qemu-action@v4

      - name: "Setting up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Build the Docker Image"
        uses: docker/build-push-action@v7
        with:
          push: true
          file: common_spark.Dockerfile
          tags: cesarleonc/custom_spark:1.0.0

      - name: "Docker Image Metadata"
        id: meta
        uses: docker/metadata-action@v6
        with:
          tags: |
            org.opencontainers.image.title="MLSpark"
            org.opencontainers.image.description="Spark with ML dependencies"
            org.opencontainers.image.authors="César León"
